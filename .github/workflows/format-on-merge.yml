name: Format on Merge

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          # Use a PAT or github-actions bot token to allow pushing back
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint fix
        run: bunx eslint --fix .

      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet && echo "changes=false" >> "$GITHUB_OUTPUT" || echo "changes=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push formatted code
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: auto-format code [skip ci]"
          git push origin main
